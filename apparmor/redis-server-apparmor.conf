# =============================================================================
# SafeCloud.PRO - systemd drop-in: attach the AppArmor profile to redis-server
# Deploy to: /etc/systemd/system/redis-server.service.d/apparmor.conf
# =============================================================================
# Ubuntu's redis-server unit sets NoNewPrivileges=true, which blocks the
# kernel's implicit path-based AppArmor attachment at exec() — the profile
# loads but redis runs UNCONFINED. Asking systemd to attach the profile
# explicitly (change_onexec) is permitted under NoNewPrivileges because the
# transition can only reduce privileges (the kernel stacks it as
# "/usr/sbin/redis-server//&unconfined").
#
# Install:
#   sudo mkdir -p /etc/systemd/system/redis-server.service.d
#   sudo cp apparmor/redis-server-apparmor.conf \
#       /etc/systemd/system/redis-server.service.d/apparmor.conf
#   sudo systemctl daemon-reload && sudo systemctl restart redis-server
# =============================================================================

[Service]
AppArmorProfile=/usr/sbin/redis-server
