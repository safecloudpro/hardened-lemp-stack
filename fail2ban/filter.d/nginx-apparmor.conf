# SafeCloud.PRO - Fail2ban filter for AppArmor AVC denials (EXPERIMENTAL)
# Deploy to: /etc/fail2ban/filter.d/nginx-apparmor.conf
#
# HONEST LIMITATION: standard AppArmor AVC denial records describe the *local*
# process and file path — they do not contain the remote client IP. This filter
# only matches enriched audit lines that carry a target="<ip>" field (e.g. from
# a custom auditd enrichment pipeline). On a default Ubuntu install it will
# match nothing, which is why the corresponding jail ships DISABLED by default.
# Treat AVC denials as a monitoring/alerting signal (see scripts/alert-apparmor-status.sh)
# rather than a per-IP banning signal.
[Definition]
failregex = type=AVC msg=audit\(.*?\): apparmor="DENIED" operation=".*?" profile="(/usr/sbin/nginx|php-fpm)" name=".*?" pid=\d+ comm=".*?" requested_mask=".*?" denied_mask=".*?" fsuid=\d+ ouid=\d+ target="<HOST>"
            apparmor="DENIED" operation=".*?" profile="(/usr/sbin/nginx|php-fpm)" name=".*?" pid=\d+ comm=".*?" requested_mask=".*?" denied_mask=".*?" fsuid=\d+ ouid=\d+ target="<HOST>"
ignoreregex =
