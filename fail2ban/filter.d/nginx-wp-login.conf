# SafeCloud.PRO - Fail2ban filter for Nginx wp-login and XML-RPC POST requests
# Deploy to: /etc/fail2ban/filter.d/nginx-wp-login.conf
#
# Matches POSTs that indicate a FAILED or blocked login attempt:
#   200 = wp-login re-rendered the form (bad credentials)
#   401/403 = explicitly denied
# 302 (successful login redirect) is deliberately NOT matched, so legitimate
# users who sign in several times are never banned.
[Definition]
failregex = ^<HOST> - .* "POST /(wp-login\.php|xmlrpc\.php) HTTP/.*" (200|401|403)
ignoreregex =
