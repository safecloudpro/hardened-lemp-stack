<svg xmlns="http://www.w3.org/2000/svg" width="860" height="762" viewBox="0 0 880 780" role="img" aria-label="SafeCloud.PRO hardened LEMP stack architecture" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5FA8DC"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8FB3D4"/>
    </marker>
  </defs>

  <rect width="880" height="780" rx="16" fill="#0B2545"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">SafeCloud.PRO — Hardened LEMP Architecture</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#B9CCE0">WordPress &amp; WooCommerce · Ubuntu 26.04 LTS · AWS Graviton ARM64</text>

  <!-- Client -->
  <rect x="310" y="86" width="260" height="40" rx="8" fill="#123561" stroke="#2C4A73"/>
  <text x="440" y="111" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">🌍 Client Browser</text>

  <line x1="440" y1="126" x2="440" y2="152" stroke="#5FA8DC" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="452" y="145" font-size="11" fill="#8FB3D4">HTTPS · TLS 1.3 · HTTP/3 QUIC</text>

  <!-- Cloudflare Edge -->
  <rect x="140" y="156" width="600" height="86" rx="10" fill="#1B6CA8"/>
  <text x="440" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">☁️ Cloudflare Edge</text>
  <text x="440" y="204" text-anchor="middle" font-size="12" fill="#DCEBF7">Managed WAF · Rate limiting · Turnstile challenges · Payment-webhook skip rules</text>
  <text x="440" y="224" text-anchor="middle" font-size="12" fill="#DCEBF7">Origin certificate + Authenticated Origin Pulls (mTLS)</text>

  <line x1="440" y1="242" x2="440" y2="272" stroke="#5FA8DC" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="452" y="263" font-size="11" fill="#8FB3D4">TLS handshake requires Cloudflare client cert — direct-to-origin scans die here</text>

  <!-- EC2 Host boundary -->
  <rect x="60" y="276" width="760" height="424" rx="12" fill="#0E2C52" stroke="#2C4A73" stroke-width="1.5"/>
  <text x="84" y="304" font-size="14" font-weight="700" fill="#FFFFFF">🖥 AWS EC2 t4g.xlarge — Ubuntu 26.04 LTS</text>
  <text x="818" y="304" text-anchor="end" font-size="11" fill="#8FB3D4">16 GB RAM · engineered memory budget</text>

  <!-- Perimeter strip -->
  <rect x="84" y="318" width="712" height="40" rx="8" fill="#B9770E"/>
  <text x="440" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">🧱 UFW deny-all firewall (22 / 80 / 443 only) &#160;+&#160; Fail2ban firewall-layer bans</text>

  <!-- Nginx -->
  <rect x="84" y="382" width="340" height="104" rx="10" fill="#1B6CA8"/>
  <text x="254" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Nginx · HTTP/3</text>
  <text x="254" y="428" text-anchor="middle" font-size="11.5" fill="#DCEBF7">ssl_verify_client on (AOP) · security headers</text>
  <text x="254" y="446" text-anchor="middle" font-size="11.5" fill="#DCEBF7">no PHP execution in uploads · dotfile deny</text>
  <rect x="154" y="458" width="200" height="20" rx="10" fill="#1E8449"/>
  <text x="254" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">🛡 AppArmor enforced</text>

  <!-- PHP-FPM -->
  <rect x="456" y="382" width="340" height="104" rx="10" fill="#1B6CA8"/>
  <text x="626" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">PHP-FPM 8.5 · static workers (auto-sized)</text>
  <text x="626" y="428" text-anchor="middle" font-size="11.5" fill="#DCEBF7">OPcache permission isolation · exec functions disabled</text>
  <text x="626" y="446" text-anchor="middle" font-size="11.5" fill="#DCEBF7">WordPress + SafeCloud hardening MU-plugin</text>
  <rect x="526" y="458" width="200" height="20" rx="10" fill="#1E8449"/>
  <text x="626" y="472" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">🛡 AppArmor enforced</text>

  <!-- socket arrow nginx <-> php -->
  <line x1="424" y1="434" x2="456" y2="434" stroke="#8FB3D4" stroke-width="2" marker-end="url(#arrowDark)" marker-start="url(#arrowDark)"/>
  <text x="440" y="420" text-anchor="middle" font-size="10" fill="#8FB3D4">unix</text>
  <text x="440" y="452" text-anchor="middle" font-size="10" fill="#8FB3D4">socket</text>

  <!-- Redis -->
  <rect x="84" y="516" width="340" height="96" rx="10" fill="#123561" stroke="#2C4A73"/>
  <text x="254" y="542" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Redis Object Cache</text>
  <text x="254" y="562" text-anchor="middle" font-size="11.5" fill="#B9CCE0">TCP disabled (port 0) · unix socket only</text>
  <text x="254" y="580" text-anchor="middle" font-size="11.5" fill="#B9CCE0">no persistence · 1 GB LRU ceiling</text>
  <rect x="154" y="588" width="200" height="18" rx="9" fill="#1E8449"/>
  <text x="254" y="601" text-anchor="middle" font-size="10.5" font-weight="600" fill="#FFFFFF">🛡 AppArmor enforced</text>

  <!-- MariaDB -->
  <rect x="456" y="516" width="340" height="96" rx="10" fill="#123561" stroke="#2C4A73"/>
  <text x="626" y="542" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">MariaDB 11.x</text>
  <text x="626" y="562" text-anchor="middle" font-size="11.5" fill="#B9CCE0">bound to 127.0.0.1 only · skip-name-resolve</text>
  <text x="626" y="580" text-anchor="middle" font-size="11.5" fill="#B9CCE0">InnoDB pool auto-sized (≤1.5 GB) — DB lives fully in RAM</text>
  <rect x="526" y="588" width="200" height="18" rx="9" fill="#1E8449"/>
  <text x="626" y="601" text-anchor="middle" font-size="10.5" font-weight="600" fill="#FFFFFF">🛡 AppArmor enforced</text>

  <!-- arrows php -> redis / mariadb -->
  <line x1="560" y1="486" x2="290" y2="516" stroke="#8FB3D4" stroke-width="2" marker-end="url(#arrowDark)"/>
  <line x1="626" y1="486" x2="626" y2="516" stroke="#8FB3D4" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="410" y="508" font-size="10" fill="#8FB3D4">unix sockets</text>
  <text x="638" y="508" font-size="10" fill="#8FB3D4">127.0.0.1</text>

  <!-- Prometheus -->
  <rect x="84" y="636" width="712" height="44" rx="8" fill="#0E2C52" stroke="#2C4A73" stroke-dasharray="5 4"/>
  <text x="440" y="663" text-anchor="middle" font-size="12.5" fill="#B9CCE0">📈 Prometheus node exporter — systemd sandbox · loopback 127.0.0.1:9100 · CPU 10% / RAM 100 MB caps · SSH-tunnel access only</text>

  <!-- Footer legend -->
  <rect x="60" y="716" width="760" height="40" rx="8" fill="#123561"/>
  <rect x="84" y="728" width="16" height="16" rx="8" fill="#1E8449"/>
  <text x="108" y="741" font-size="11.5" fill="#DCEBF7">Kernel-enforced AppArmor confinement (no shell exec, immutable code paths)</text>
  <text x="796" y="741" text-anchor="end" font-size="11.5" fill="#8FB3D4">safecloud.pro · Apache-2.0</text>
</svg>
